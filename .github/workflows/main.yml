name: AI Status Auto-Update
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
jobs:
  update-ai-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node updater.js
      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Status Bot"
          git add ai-updates.json
          git diff --staged --quiet || git commit -m "chore: update ai-updates.json [$(date -u +%Y-%m-%dT%H:%M)]"
          git push
